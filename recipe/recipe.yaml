schema_version: 1

context:
  name: hypothesis-graphql
  version: "0.13.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/hypothesis_graphql-${{ version }}.tar.gz
  sha256: 788d89be1bbb561f27616f3a7077290054e4f664f88315a0ad03edee93e5d681

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - hatchling
    - pip
    - python ${{ python_min }}.*
  run:
    - graphql-core >=3.1.0,<3.3.0
    - hypothesis >=6.84.3,<7.0
    - python >=${{ python_min }},<4.0

tests:
  - python:
      imports:
        - hypothesis_graphql
      pip_check: true
      python_version: ${{ python_min }}.*
  - files:
      source:
        - test
    requirements:
      run:
        - pytest >=6.2.0,<8
        - pytest-xdist >=2.5,<3.0
        - python ${{ python_min }}.*
    script:
      - pytest -vvv --capture=tee-sys test

about:
  summary: Hypothesis strategies for GraphQL queries and mutations
  license: MIT
  license_file:
    - LICENSE
  homepage: https://github.com/Stranger6667/hypothesis-graphql

extra:
  recipe-maintainers:
    - thewchan
